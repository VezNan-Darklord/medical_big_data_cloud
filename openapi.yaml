openapi: 3.0.3
info:
  title: 医养结合云端后台管理系统 API
  version: 1.0.0
  description: 基于项目当前 Spring Boot 实现与 train.md 整理的前后端接口契约。
servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境
security:
  - bearerAuth: []
tags:
  - { name: Auth, description: 登录认证 }
  - { name: Dashboard, description: 首页看板 }
  - { name: ElderlyProfile, description: 老人档案 }
  - { name: HealthWarning, description: 健康预警 }
  - { name: AssessmentReport, description: 评估报告 }
  - { name: KeyPopulation, description: 重点人群 }
  - { name: ReportStatistics, description: 报表统计 }
  - { name: Device, description: 设备管理 }
  - { name: ElderlyAccount, description: 老人账户 }
  - { name: DoctorAccount, description: 医生账户 }
  - { name: UserAccount, description: 系统账户 }
  - { name: Profile, description: 个人中心 }
  - { name: AIAnalysis, description: 决策分析 }
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      operationId: login
      security: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/LoginRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/LoginResponse' }, '400': { $ref: '#/components/responses/Error' }, '401': { $ref: '#/components/responses/Error' } }
  /auth/register:
    post:
      tags: [Auth]
      summary: 统一用户注册
      description: 未登录用户只能注册 elderly 角色；已登录管理员可注册 doctor 角色；管理员只能在 APIFox 中注册；返回 JWT token
      operationId: register
      security: []
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/RegisterRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/LoginResponse' }, '400': { $ref: '#/components/responses/Error' }, '403': { $ref: '#/components/responses/Error' } }
  /auth/me:
    get:
      tags: [Auth]
      summary: 当前用户
      operationId: getCurrentUser
      responses: { '200': { $ref: '#/components/responses/UserResponse' }, '401': { $ref: '#/components/responses/Error' } }
  /auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录
      operationId: logout
      responses: { '200': { $ref: '#/components/responses/EmptyResponse' } }
  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: 首页总览
      operationId: getDashboardOverview
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiDashboardOverview' } } } } }
  /dashboard/charts:
    get:
      tags: [Dashboard]
      summary: 首页图表
      operationId: getDashboardCharts
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiChartList' } } } } }
  /elderly-profiles:
    get:
      tags: [ ElderlyProfile ]
      summary: 老人档案列表
      operationId: listElderlyProfiles
      parameters:
        - { $ref: '#/components/parameters/Keyword' }
        - { name: gender, in: query, schema: { type: string, enum: [ male, female ] } }
        - { name: careLevel, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { name: regionCode, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/PageNo' }
        - { $ref: '#/components/parameters/PageSize' }
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiElderlyPage' } } } } }
    post:
      tags: [ ElderlyProfile ]
      summary: 新增老人档案
      description: 仅限 admin 和 doctor 角色调用
      operationId: createElderlyProfile
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ElderlyProfileInput' } } } }
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiElderly' } } } }, '400': { $ref: '#/components/responses/Error' } }
  /elderly-profiles/{id}:
    parameters: [{ $ref: '#/components/parameters/Id' }]
    get:
      tags: [ElderlyProfile]
      summary: 老人档案详情
      operationId: getElderlyProfile
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiElderly' } } } }, '404': { $ref: '#/components/responses/Error' } }
    put:
      tags: [ElderlyProfile]
      summary: 更新老人档案
      operationId: updateElderlyProfile
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ElderlyProfileInput' } } } }
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiElderly' } } } } }
    delete:
      tags: [ElderlyProfile]
      summary: 软删除老人档案
      operationId: deleteElderlyProfile
      responses: { '200': { $ref: '#/components/responses/EmptyResponse' } }
  /elderly-profiles/{id}/warnings: { get: { tags: [ElderlyProfile], summary: 老人关联预警, operationId: getElderlyWarnings, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /elderly-profiles/{id}/reports: { get: { tags: [ElderlyProfile], summary: 老人关联报告, operationId: getElderlyReports, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /elderly-profiles/{id}/devices: { get: { tags: [ElderlyProfile], summary: 老人关联设备, operationId: getElderlyDevices, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /elderly-profiles/{id}/key-populations: { get: { tags: [ElderlyProfile], summary: 老人关联重点人群, operationId: getElderlyKeyPopulations, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /health-warnings:
    get:
      tags: [ HealthWarning ]
      summary: 预警列表
      operationId: listHealthWarnings
      parameters:
        - { name: elderlyId, in: query, schema: { type: string } }
        - { name: warningType, in: query, schema: { type: string } }
        - { name: severity, in: query, schema: { type: string, enum: [ low, medium, high, critical ] } }
        - { name: status, in: query, schema: { type: string } }
        - { name: source, in: query, schema: { type: string } }
        - { name: startTime, in: query, schema: { type: string, format: date-time } }
        - { name: endTime, in: query, schema: { type: string, format: date-time } }
        - { $ref: '#/components/parameters/PageNo' }
        - { $ref: '#/components/parameters/PageSize' }
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiWarningPage' } } } } }
    post:
      tags: [ HealthWarning ]
      summary: 新增健康预警
      operationId: createHealthWarning
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/HealthWarningCreateRequest' } } } }
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiWarning' } } } }, '400': { $ref: '#/components/responses/Error' } }
  /health-warnings/{id}:
    get:
      tags: [HealthWarning]
      summary: 预警详情
      operationId: getHealthWarning
      parameters: [{ $ref: '#/components/parameters/Id' }]
      responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiWarning' } } } } }
  /health-warnings/{id}/handle:
    post:
      tags: [HealthWarning]
      summary: 处理预警
      operationId: handleHealthWarning
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/WarningHandleRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/EmptyResponse' } }
  /health-warnings/{id}/assign:
    post:
      tags: [HealthWarning]
      summary: 转派预警
      operationId: assignHealthWarning
      parameters: [{ $ref: '#/components/parameters/Id' }]
      requestBody: { required: true, content: { application/json: { schema: { type: string } } } }
      responses: { '200': { $ref: '#/components/responses/EmptyResponse' } }
  /assessment-reports:
    get:
      tags: [AssessmentReport]
      summary: 报告列表
      operationId: listAssessmentReports
      parameters: [{ name: elderlyId, in: query, schema: { type: string } }, { $ref: '#/components/parameters/PageNo' }, { $ref: '#/components/parameters/PageSize' }]
      responses: { '200': { $ref: '#/components/responses/ObjectPageResponse' } }
    post:
      tags: [AssessmentReport]
      summary: 生成评估报告
      operationId: createAssessmentReport
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AssessmentReportInput' } } } }
      responses: { '200': { $ref: '#/components/responses/ObjectResponse' } }
  /assessment-reports/{id}: { get: { tags: [AssessmentReport], summary: 报告详情, operationId: getAssessmentReport, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } } }
  /assessment-reports/{id}/export: { get: { tags: [AssessmentReport], summary: 导出报告, operationId: exportAssessmentReport, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/StringResponse' } } } }
  /key-populations:
    get: { tags: [KeyPopulation], summary: 重点人群列表, operationId: listKeyPopulations, parameters: [{ name: status, in: query, schema: { type: string } }, { $ref: '#/components/parameters/PageNo' }, { $ref: '#/components/parameters/PageSize' }], responses: { '200': { $ref: '#/components/responses/ObjectPageResponse' } } }
    post: { tags: [KeyPopulation], summary: 新增重点人群, operationId: createKeyPopulation, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/KeyPopulationInput' } } } }, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } }
  /key-populations/{id}: { put: { tags: [KeyPopulation], summary: 更新重点人群, operationId: updateKeyPopulation, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/KeyPopulationInput' } } } }, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } } }
  /key-populations/{id}/close: { post: { tags: [KeyPopulation], summary: 关闭重点人群, operationId: closeKeyPopulation, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /reports/statistics/overview: { get: { tags: [ReportStatistics], summary: 统计总览, operationId: getStatisticsOverview, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } } }
  /reports/statistics/trends: { get: { tags: [ReportStatistics], summary: 趋势统计, operationId: getStatisticsTrends, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } } }
  /reports/statistics/distributions: { get: { tags: [ReportStatistics], summary: 分布统计, operationId: getStatisticsDistributions, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } } }
  /reports/statistics/export: { get: { tags: [ReportStatistics], summary: 导出统计报表, operationId: exportStatistics, responses: { '200': { $ref: '#/components/responses/StringResponse' } } } }
  /devices:
    get: { tags: [Device], summary: 设备列表, operationId: listDevices, parameters: [{ name: bindingStatus, in: query, schema: { type: string } }, { name: onlineStatus, in: query, schema: { type: string } }, { $ref: '#/components/parameters/PageNo' }, { $ref: '#/components/parameters/PageSize' }], responses: { '200': { $ref: '#/components/responses/ObjectPageResponse' } } }
    post: { tags: [Device], summary: 新增设备, operationId: createDevice, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DeviceCreateRequest' } } } }, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } }
  /devices/{id}:
    get: { tags: [Device], summary: 设备详情, operationId: getDevice, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } }
    put: { tags: [Device], summary: 更新设备, operationId: updateDevice, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DeviceUpdateRequest' } } } }, responses: { '200': { $ref: '#/components/responses/ObjectResponse' } } }
  /devices/bind: { post: { tags: [Device], summary: 绑定设备, operationId: bindDevice, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DeviceBindRequest' } } } }, responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /devices/{id}/unbind: { post: { tags: [Device], summary: 解绑设备, operationId: unbindDevice, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /devices/{id}/reports: { get: { tags: [Device], summary: 设备上报记录, operationId: getDeviceReports, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /elderly-accounts: { get: { tags: [ElderlyAccount], summary: 老人账户列表, operationId: listElderlyAccounts, parameters: [{ $ref: '#/components/parameters/PageNo' }, { $ref: '#/components/parameters/PageSize' }], responses: { '200': { $ref: '#/components/responses/ObjectPageResponse' } } } }
  /elderly-accounts/{id}/reset-password: { post: { tags: [ElderlyAccount], summary: 重置老人密码, operationId: resetElderlyPassword, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { $ref: '#/components/requestBodies/PasswordText' }, responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /elderly-accounts/{id}/status: { post: { tags: [ElderlyAccount], summary: 修改老人账户状态, operationId: updateElderlyAccountStatus, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { $ref: '#/components/requestBodies/Status' }, responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /doctor-accounts: { get: { tags: [DoctorAccount], summary: 医生账户列表, operationId: listDoctorAccounts, parameters: [{ $ref: '#/components/parameters/PageNo' }, { $ref: '#/components/parameters/PageSize' }], responses: { '200': { $ref: '#/components/responses/ObjectPageResponse' } } } }
  /doctor-accounts/{id}/reset-password: { post: { tags: [DoctorAccount], summary: 重置医生密码, operationId: resetDoctorPassword, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { $ref: '#/components/requestBodies/PasswordText' }, responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /users: { get: { tags: [UserAccount], summary: 系统账户列表, operationId: listUsers, parameters: [{ $ref: '#/components/parameters/Keyword' }, { name: roleCode, in: query, schema: { type: string } }, { name: status, in: query, schema: { type: string } }, { $ref: '#/components/parameters/PageNo' }, { $ref: '#/components/parameters/PageSize' }], responses: { '200': { $ref: '#/components/responses/ObjectPageResponse' } } } }
  /users/{id}: { get: { tags: [UserAccount], summary: 系统账户详情, operationId: getUser, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { $ref: '#/components/responses/UserResponse' } } }, put: { tags: [UserAccount], summary: 更新系统账户, operationId: updateUser, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { $ref: '#/components/requestBodies/UserUpdate' }, responses: { '200': { $ref: '#/components/responses/UserResponse' } } } }
  /users/{id}/roles: { post: { tags: [UserAccount], summary: 分配角色, operationId: assignUserRole, parameters: [{ $ref: '#/components/parameters/Id' }], requestBody: { required: true, content: { application/json: { schema: { type: string } } } }, responses: { '200': { $ref: '#/components/responses/EmptyResponse' } } } }
  /profile:
    put:
      tags: [ Profile ]
      summary: 统一个人资料更新
      description: 用户修改自己的账户信息，涵盖：对外展示信息(realName)、个人隐私信息(mobile)、密码修改(oldPassword+newPassword)。所有字段为可选，仅传入非空字段会被更新。
      operationId: updateProfile
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ProfileUpdateRequest' } } } }
      responses: { '200': { $ref: '#/components/responses/UserResponse' }, '400': { $ref: '#/components/responses/Error' } }
  /profile/todos: { get: { tags: [Profile], summary: 我的待办, operationId: getTodos, responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /ai/analysis/care-decision: { post: { tags: [AIAnalysis], summary: 生成照护决策分析, description: 仅限 admin 和 doctor 角色调用, operationId: createCareDecisionAnalysis, requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/AnalysisRequest' } } } }, responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiAnalysisResult' } } } } } } }
  /ai/analysis/care-decision/history: { get: { tags: [AIAnalysis], summary: 分析历史, operationId: listCareDecisionHistory, responses: { '200': { $ref: '#/components/responses/ObjectListResponse' } } } }
  /ai/analysis/care-decision/{id}: { get: { tags: [AIAnalysis], summary: 分析详情, operationId: getCareDecisionAnalysis, parameters: [{ $ref: '#/components/parameters/Id' }], responses: { '200': { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiAnalysisResult' } } } }, '404': { $ref: '#/components/responses/Error' } } } }
components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string } }
    Keyword: { name: keyword, in: query, schema: { type: string } }
    PageNo: { name: pageNo, in: query, schema: { type: integer, minimum: 1, default: 1 } }
    PageSize: { name: pageSize, in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 10 } }
  requestBodies:
    UserCreate: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UserCreateRequest' } } } }
    UserUpdate: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/UserUpdateRequest' } } } }
    PasswordText: { required: true, content: { text/plain: { schema: { type: string, minLength: 6, maxLength: 20 } } } }
    Status: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/StatusRequest' } } } }
  responses:
    EmptyResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiEmpty' } } } }
    StringResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiString' } } } }
    ObjectResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiObject' } } } }
    ObjectListResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiObjectList' } } } }
    ObjectPageResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiObjectPage' } } } }
    UserResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/UserResponse' } } } }
    LoginResponse: { description: 成功, content: { application/json: { schema: { $ref: '#/components/schemas/ApiLogin' } } } }
    Error: { description: 业务错误, content: { application/json: { schema: { $ref: '#/components/schemas/ApiError' } } } }
  schemas:
    ApiBase:
      type: object
      required: [code, message, traceId]
      properties: { code: { type: integer, example: 0 }, message: { type: string, example: success }, traceId: { type: string } }
    ApiEmpty: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { nullable: true } } }] }
    ApiString: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { type: string } } }] }
    ApiObject: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { type: object, additionalProperties: true } } }] }
    ApiObjectList: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { type: array, items: { type: object, additionalProperties: true } } } }] }
    ApiObjectPage: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { $ref: '#/components/schemas/ObjectPage' } } }] }
    ApiError: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { nullable: true } } }] }
    ObjectPage:
      type: object
      required: [list, pageNo, pageSize, total]
      properties: { list: { type: array, items: { type: object, additionalProperties: true } }, pageNo: { type: integer }, pageSize: { type: integer }, total: { type: integer, format: int64 } }
    LoginRequest:
      type: object
      required: [username, password]
      properties: { username: { type: string, maxLength: 50 }, password: { type: string, minLength: 6, maxLength: 20, writeOnly: true } }
    RegisterRequest:
      type: object
      required: [username, password, realName, mobile, roleCode]
      properties:
        username: { type: string, minLength: 3, maxLength: 50, pattern: '^[A-Za-z0-9_]+$' }
        password: { type: string, minLength: 6, maxLength: 20, writeOnly: true }
        realName: { type: string, maxLength: 50 }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$' }
        roleCode: { type: string, enum: [admin, doctor, elderly] }
    LoginResult:
      type: object
      properties: { token: { type: string }, expireAt: { type: string, format: date-time }, user: { $ref: '#/components/schemas/User' } }
    ApiLogin: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { $ref: '#/components/schemas/LoginResult' } } }] }
    User:
      type: object
      properties: { id: { type: string }, username: { type: string }, realName: { type: string }, roleCode: { type: string }, mobile: { type: string }, status: { type: string }, lastLoginAt: { type: string, format: date-time }, createdAt: { type: string, format: date-time }, updatedAt: { type: string, format: date-time } }
    ApiUser: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { $ref: '#/components/schemas/User' } } }] }
    UserCreateRequest:
      type: object
      required: [username, password, roleCode]
      properties: { username: { type: string, maxLength: 50 }, password: { type: string, minLength: 6, maxLength: 20, writeOnly: true }, realName: { type: string }, roleCode: { type: string }, mobile: { type: string }, status: { type: string } }
    UserUpdateRequest: { type: object, properties: { realName: { type: string }, roleCode: { type: string }, mobile: { type: string }, status: { type: string } } }
    UserResponse: { allOf: [{ $ref: '#/components/schemas/ApiBase' }, { type: object, properties: { data: { $ref: '#/components/schemas/User' } } }] }
    StatusRequest: { type: object, required: [status], properties: { status: { type: string } } }
    ProfileUpdateRequest:
      type: object
      properties:
        realName: { type: string, maxLength: 50, description: 对外展示信息-真实姓名 }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$', description: 个人隐私信息-手机号 }
