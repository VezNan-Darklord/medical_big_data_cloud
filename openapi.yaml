openapi: 3.0.3
info:
  title: 医养结合云端后台管理系统 API
  version: 2.0.0
  description: |
    基于 train.md 与当前 Spring Boot 实现维护的 REST API 契约。
    除登录、公开注册和刷新令牌外，接口均需要 Bearer access token。
    JSON 成功响应的业务 code 固定为 0，错误响应同时使用正确的 HTTP 状态码。
servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境
security:
  - bearerAuth: []
tags:
  - { name: Auth, description: Token 认证 }
  - { name: Dashboard, description: 首页看板 }
  - { name: ElderlyProfile, description: 老人档案 }
  - { name: HealthWarning, description: 健康预警 }
  - { name: AssessmentReport, description: 评估报告 }
  - { name: KeyPopulation, description: 重点人群 }
  - { name: ReportStatistics, description: 报表统计 }
  - { name: Device, description: 设备管理 }
  - { name: ElderlyAccount, description: 老人账户 }
  - { name: DoctorAccount, description: 医生账户 }
  - { name: UserAccount, description: 系统账户 }
  - { name: Profile, description: 个人中心 }
  - { name: AIAnalysis, description: 结构化照护决策分析 }
paths:
  /auth/login:
    post:
      tags: [Auth]
      summary: 登录
      operationId: login
      security: []
      requestBody:
        $ref: "#/components/requestBodies/Login"
      responses:
        "200": { $ref: "#/components/responses/LoginResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/register:
    post:
      tags: [Auth]
      summary: 注册账号并直接登录
      description: 浏览器前端仅允许注册 elderly；仅当服务端开启 Apifox 特权注册开关且 User-Agent 包含 Apifox 时，才可注册 admin、doctor 或 elderly。成功后直接返回 access token 与可轮换 refresh token。该开关默认关闭，仅用于本地开发。
      operationId: register
      security: []
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: 浏览器使用默认 User-Agent；Apifox 创建管理员或医生时必须包含 Apifox，且服务端已开启特权注册开关。
          schema: { type: string }
      requestBody:
        $ref: "#/components/requestBodies/Register"
      responses:
        "201": { $ref: "#/components/responses/LoginResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /auth/refresh:
    post:
      tags: [Auth]
      summary: 刷新并轮换令牌
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RefreshTokenRequest" }
      responses:
        "200": { $ref: "#/components/responses/LoginResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/me:
    get:
      tags: [Auth]
      summary: 获取当前用户
      operationId: getCurrentUser
      responses:
        "200": { $ref: "#/components/responses/UserResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
  /auth/logout:
    post:
      tags: [Auth]
      summary: 退出登录并使当前 access token 失效
      operationId: logout
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LogoutRequest" }
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }

  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: 首页真实指标总览
      operationId: getDashboardOverview
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiDashboardOverview" }
  /dashboard/charts:
    get:
      tags: [Dashboard]
      summary: 首页聚合图表
      operationId: getDashboardCharts
      responses:
        "200": { $ref: "#/components/responses/ChartListResponse" }

  /elderly-profiles:
    get:
      tags: [ElderlyProfile]
      summary: 老人档案列表
      operationId: listElderlyProfiles
      parameters:
        - { $ref: "#/components/parameters/Keyword" }
        - {
            name: gender,
            in: query,
            schema: { type: string, enum: [male, female, unknown] },
          }
        - { name: careLevel, in: query, schema: { type: string } }
        - {
            name: status,
            in: query,
            schema: { type: string, enum: [active, inactive] },
          }
        - { name: regionCode, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/PageNo" }
        - { $ref: "#/components/parameters/PageSize" }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiElderlyPage" }
    post:
      tags: [ElderlyProfile]
      summary: 新增老人档案
      operationId: createElderlyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ElderlyProfileCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/ElderlyResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /elderly-profiles/{id}:
    parameters:
      - { $ref: "#/components/parameters/Id" }
    get:
      tags: [ElderlyProfile]
      summary: 老人档案详情
      operationId: getElderlyProfile
      responses:
        "200": { $ref: "#/components/responses/ElderlyResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [ElderlyProfile]
      summary: 更新老人档案
      operationId: updateElderlyProfile
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ElderlyProfileUpdateRequest" }
      responses:
        "200": { $ref: "#/components/responses/ElderlyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
    delete:
      tags: [ElderlyProfile]
      summary: 软删除老人档案
      operationId: deleteElderlyProfile
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /elderly-profiles/{id}/warnings:
    get:
      tags: [ElderlyProfile]
      summary: 查询老人关联预警
      operationId: getElderlyWarnings
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/WarningListResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
  /elderly-profiles/{id}/reports:
    get:
      tags: [ElderlyProfile]
      summary: 查询老人关联报告
      operationId: getElderlyReports
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/AssessmentReportListResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
  /elderly-profiles/{id}/devices:
    get:
      tags: [ElderlyProfile]
      summary: 查询老人关联设备
      operationId: getElderlyDevices
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/DeviceListResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
  /elderly-profiles/{id}/key-populations:
    get:
      tags: [ElderlyProfile]
      summary: 查询老人重点人群记录
      operationId: getElderlyKeyPopulations
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/KeyPopulationListResponse" }
        "404": { $ref: "#/components/responses/NotFound" }

  /health-warnings:
    get:
      tags: [HealthWarning]
      summary: 健康预警列表
      operationId: listHealthWarnings
      parameters:
        - { name: elderlyId, in: query, schema: { type: string } }
        - { name: warningType, in: query, schema: { type: string } }
        - {
            name: severity,
            in: query,
            schema: { type: string, enum: [low, medium, high, critical] },
          }
        - {
            name: status,
            in: query,
            schema:
              {
                type: string,
                enum: [unprocessed, processing, processed, closed],
              },
          }
        - { name: source, in: query, schema: { type: string } }
        - {
            name: startTime,
            in: query,
            schema: { type: string, format: date-time },
          }
        - {
            name: endTime,
            in: query,
            schema: { type: string, format: date-time },
          }
        - { $ref: "#/components/parameters/PageNo" }
        - { $ref: "#/components/parameters/PageSize" }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiWarningPage" }
        "400": { $ref: "#/components/responses/BadRequest" }
    post:
      tags: [HealthWarning]
      summary: 新增健康预警
      operationId: createHealthWarning
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HealthWarningCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/WarningResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /health-warnings/{id}:
    parameters:
      - { $ref: "#/components/parameters/Id" }
    get:
      tags: [HealthWarning]
      summary: 预警详情
      operationId: getHealthWarning
      responses:
        "200": { $ref: "#/components/responses/WarningResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [HealthWarning]
      summary: 软删除预警
      operationId: deleteHealthWarning
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /health-warnings/{id}/handle:
    post:
      tags: [HealthWarning]
      summary: 处理或关闭预警
      operationId: handleHealthWarning
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HealthWarningHandleRequest" }
      responses:
        "200": { $ref: "#/components/responses/WarningResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /health-warnings/{id}/assign:
    post:
      tags: [HealthWarning]
      summary: 转派预警给医生
      operationId: assignHealthWarning
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/HealthWarningAssignRequest" }
      responses:
        "200": { $ref: "#/components/responses/WarningResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /assessment-reports:
    get:
      tags: [AssessmentReport]
      summary: 评估报告列表
      description: 仅管理员和医生可访问。
      operationId: listAssessmentReports
      parameters:
        - { name: elderlyId, in: query, schema: { type: string } }
        - { $ref: "#/components/parameters/PageNo" }
        - { $ref: "#/components/parameters/PageSize" }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiAssessmentReportPage" }
        "403": { $ref: "#/components/responses/Forbidden" }
    post:
      tags: [AssessmentReport]
      summary: 创建评估报告
      description: 管理员或医生创建。评估人固定取当前登录用户，报告必须包含病症/风险评估和用药或后续动作建议。
      operationId: createAssessmentReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/AssessmentReportCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/AssessmentReportResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /assessment-reports/{id}:
    parameters:
      - { $ref: "#/components/parameters/Id" }
    get:
      tags: [AssessmentReport]
      summary: 报告详情
      description: 仅管理员和医生可访问。
      operationId: getAssessmentReport
      responses:
        "200": { $ref: "#/components/responses/AssessmentReportResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [AssessmentReport]
      summary: 修改评估报告
      description: 仅管理员和医生可访问。修改后复核状态重置为 draft，需重新复核；不允许更换关联老人。
      operationId: updateAssessmentReport
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/AssessmentReportUpdateRequest" }
      responses:
        "200": { $ref: "#/components/responses/AssessmentReportResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [AssessmentReport]
      summary: 软删除报告
      operationId: deleteAssessmentReport
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /assessment-reports/{id}/review:
    post:
      tags: [AssessmentReport]
      summary: 复核评估报告
      operationId: reviewAssessmentReport
      parameters: [{ $ref: "#/components/parameters/Id" }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              { $ref: "#/components/schemas/AssessmentReportReviewRequest" }
      responses:
        "200": { $ref: "#/components/responses/AssessmentReportResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /assessment-reports/{id}/export:
    get:
      tags: [AssessmentReport]
      summary: 导出 Markdown 报告文件
      description: 仅管理员和医生可访问。
      operationId: exportAssessmentReport
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200":
          description: UTF-8 Markdown 文件
          headers:
            Content-Disposition:
              schema: { type: string }
          content:
            text/markdown:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /key-populations:
    get:
      tags: [KeyPopulation]
      summary: 重点人群列表
      operationId: listKeyPopulations
      parameters:
        - {
            name: status,
            in: query,
            schema: { type: string, enum: [active, closed] },
          }
        - { $ref: "#/components/parameters/PageNo" }
        - { $ref: "#/components/parameters/PageSize" }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiKeyPopulationPage" }
    post:
      tags: [KeyPopulation]
      summary: 新增重点人群
      operationId: createKeyPopulation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KeyPopulationCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/KeyPopulationResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /key-populations/{id}:
    parameters:
      - { $ref: "#/components/parameters/Id" }
    get:
      tags: [KeyPopulation]
      summary: 重点人群详情
      operationId: getKeyPopulation
      responses:
        "200": { $ref: "#/components/responses/KeyPopulationResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [KeyPopulation]
      summary: 更新重点人群
      operationId: updateKeyPopulation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/KeyPopulationUpdateRequest" }
      responses:
        "200": { $ref: "#/components/responses/KeyPopulationResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [KeyPopulation]
      summary: 软删除重点人群记录
      operationId: deleteKeyPopulation
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
  /key-populations/{id}/close:
    post:
      tags: [KeyPopulation]
      summary: 关闭重点人群记录
      operationId: closeKeyPopulation
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /reports/statistics/overview:
    get:
      tags: [ReportStatistics]
      summary: 报表统计总览
      description: 仅管理员可访问，返回顶部统计卡片所需的业务指标。
      operationId: getStatisticsOverview
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiStatisticsOverview" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /reports/statistics/trends:
    get:
      tags: [ReportStatistics]
      summary: 趋势统计图表
      description: 仅管理员可访问。固定返回重点人群变化趋势、老人档案变化趋势和设备关联统计。
      operationId: getStatisticsTrends
      responses:
        "200": { $ref: "#/components/responses/ChartListResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /reports/statistics/distributions:
    get:
      tags: [ReportStatistics]
      summary: 分布统计图表
      description: 仅管理员可访问。
      operationId: getStatisticsDistributions
      responses:
        "200": { $ref: "#/components/responses/ChartListResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /reports/statistics/export:
    get:
      tags: [ReportStatistics]
      summary: 导出统计 CSV
      description: 仅管理员可访问。
      operationId: exportStatistics
      responses:
        "200":
          description: UTF-8 CSV 文件
          headers:
            Content-Disposition:
              schema: { type: string }
          content:
            text/csv:
              schema: { type: string, format: binary }
        "403": { $ref: "#/components/responses/Forbidden" }

  /devices:
    get:
      tags: [Device]
      summary: 设备列表
      operationId: listDevices
      parameters:
        - {
            name: bindingStatus,
            in: query,
            schema: { type: string, enum: [bound, unbound] },
          }
        - {
            name: onlineStatus,
            in: query,
            schema: { type: string, enum: [online, offline] },
          }
        - { $ref: "#/components/parameters/PageNo" }
        - { $ref: "#/components/parameters/PageSize" }
      responses:
        "200":
          description: 成功
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ApiDevicePage" }
    post:
      tags: [Device]
      summary: 新增设备
      operationId: createDevice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceCreateRequest" }
      responses:
        "201": { $ref: "#/components/responses/DeviceResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /devices/bind:
    post:
      tags: [Device]
      summary: 绑定设备到老人档案
      operationId: bindDevice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceBindRequest" }
      responses:
        "200": { $ref: "#/components/responses/DeviceResponse" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "409": { $ref: "#/components/responses/Conflict" }
  /devices/{id}:
    parameters:
      - { $ref: "#/components/parameters/Id" }
    get:
      tags: [Device]
      summary: 设备详情
      operationId: getDevice
      responses:
        "200": { $ref: "#/components/responses/DeviceResponse" }
        "404": { $ref: "#/components/responses/NotFound" }
    put:
      tags: [Device]
      summary: 更新设备
      operationId: updateDevice
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/DeviceUpdateRequest" }
      responses:
        "200": { $ref: "#/components/responses/DeviceResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    delete:
      tags: [Device]
      summary: 软删除设备
      operationId: deleteDevice
      responses:
        "200": { $ref: "#/components/responses/EmptyResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { $ref: "#/components/responses/Conflict" }
  /devices/{id}/unbind:
    post:
      tags: [Device]
      summary: 解绑设备
      operationId: unbindDevice
      parameters: [{ $ref: "#/components/parameters/Id" }]
      responses:
        "200": { $ref: "#/components/responses/DeviceResponse" }
        "403": { $ref: "#/components/responses/Forbidden" }
