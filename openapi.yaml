      responses:
        "200": { $ref: "#/components/responses/AnalysisResponse" }
        "404": { $ref: "#/components/responses/NotFound" }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Id:
      name: id
      in: path
      required: true
      schema: { type: string, maxLength: 64 }
    Keyword:
      name: keyword
      in: query
      schema: { type: string, maxLength: 100 }
    PageNo:
      name: pageNo
      in: query
      schema: { type: integer, minimum: 1, default: 1 }
    PageSize:
      name: pageSize
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
  requestBodies:
    Login:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/LoginRequest" }
    Register:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/RegisterRequest" }
    Password:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/PasswordRequest" }
    UserStatus:
      required: true
      content:
        application/json:
          schema: { $ref: "#/components/schemas/UserStatusUpdateRequest" }
  responses:
    EmptyResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiEmpty" }
    LoginResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiLogin" }
    UserResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiUser" }
    ElderlyResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiElderly" }
    WarningResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiWarning" }
    WarningListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiWarningList" }
    AssessmentReportResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiAssessmentReport" }
    AssessmentReportListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiAssessmentReportList" }
    KeyPopulationResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiKeyPopulation" }
    KeyPopulationListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiKeyPopulationList" }
    DeviceResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiDevice" }
    DeviceListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiDeviceList" }
    DeviceReportResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiDeviceReport" }
    DeviceReportListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiDeviceReportList" }
    ChartListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiChartList" }
    TodoListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiTodoList" }
    AnalysisResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiAnalysis" }
    AnalysisListResponse:
      description: 成功
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiAnalysisList" }
    BadRequest:
      description: 参数或业务输入错误
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorResponse" }
    Unauthorized:
      description: 未登录、令牌无效或账号已禁用
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorResponse" }
    Forbidden:
      description: 当前角色无权访问
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorResponse" }
    NotFound:
      description: 数据不存在
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorResponse" }
    Conflict:
      description: 数据冲突或仍被引用
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ApiErrorResponse" }
  schemas:
    ApiBase:
      type: object
      required: [code, message, traceId]
      properties:
        code: { type: integer, example: 0 }
        message: { type: string, example: success }
        traceId: { type: string, example: b3c1f8e9d8f14a7f }
    ApiEmpty:
      allOf:
        - { $ref: "#/components/schemas/ApiBase" }
        - type: object
          properties:
            data: { nullable: true }
    ApiErrorResponse:
      type: object
      required: [code, message, traceId]
      properties:
        code: { type: integer, enum: [400, 401, 403, 404, 409, 500, 501] }
        message: { type: string }
        data: { nullable: true }
        traceId: { type: string }

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username: { type: string }
        password: { type: string, writeOnly: true }
    RegisterRequest:
      type: object
      required: [username, password, realName]
      properties:
        username:
          {
            type: string,
            minLength: 3,
            maxLength: 50,
            pattern: "^[A-Za-z0-9_]+$",
          }
        password: { type: string, minLength: 8, maxLength: 64, writeOnly: true }
        realName: { type: string, maxLength: 50 }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$' }
        roleCode:
          type: string
          enum: [elderly, doctor, admin]
          default: elderly
          description: 浏览器前端只能传 elderly；服务端开启特权注册开关后，Apifox 可传 doctor 或 admin。
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, writeOnly: true }
    LogoutRequest:
      type: object
      properties:
        refreshToken: { type: string, writeOnly: true }
    LoginResult:
      type: object
      required:
        [
          token,
          accessToken,
          refreshToken,
          tokenType,
          expireAt,
          accessExpireAt,
          refreshExpireAt,
          user,
        ]
      properties:
        token: { type: string, description: 兼容旧前端的 accessToken 别名 }
        accessToken: { type: string }
        refreshToken: { type: string }
        tokenType: { type: string, example: Bearer }
        expireAt:
          {
            type: string,
            format: date-time,
            description: 兼容旧前端的 accessExpireAt 别名,
          }
        accessExpireAt: { type: string, format: date-time }
        refreshExpireAt: { type: string, format: date-time }
        user:
          $ref: "#/components/schemas/LoginUserInfo"
    LoginUserInfo:
      type: object
      properties:
        id: { type: string }
        realName: { type: string }
        roleCode: { $ref: "#/components/schemas/RoleCode" }
        mobile: { type: string, nullable: true }
    ApiLogin:
      allOf:
        - { $ref: "#/components/schemas/ApiBase" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/LoginResult" }

    RoleCode:
      type: string
      enum: [admin, doctor, operator, analyst, elderly]
    User:
      type: object
      properties:
        id: { type: string }
        username: { type: string }
        realName: { type: string }
        roleCode: { $ref: "#/components/schemas/RoleCode" }
        mobile: { type: string, nullable: true }
        institutionId: { type: string, nullable: true }
        regionCode: { type: string, nullable: true }
        status: { type: string, enum: [enabled, disabled] }
        lastLoginAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    UserCreateRequest:
      type: object
      required: [username, password, realName, roleCode]
      properties:
        username:
          {
            type: string,
            minLength: 3,
            maxLength: 50,
            pattern: "^[A-Za-z0-9_]+$",
          }
        password: { type: string, minLength: 8, maxLength: 64, writeOnly: true }
        realName: { type: string, maxLength: 50 }
        roleCode: { $ref: "#/components/schemas/RoleCode" }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$' }
        institutionId: { type: string, maxLength: 64 }
        regionCode: { type: string, maxLength: 64 }
        status: { type: string, enum: [enabled, disabled], default: enabled }
    SpecializedUserCreateRequest:
      type: object
      required: [username, password, realName]
      properties:
        username:
          {
            type: string,
            minLength: 3,
            maxLength: 50,
            pattern: "^[A-Za-z0-9_]+$",
          }
        password: { type: string, minLength: 8, maxLength: 64, writeOnly: true }
        realName: { type: string, maxLength: 50 }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$' }
        institutionId: { type: string, maxLength: 64 }
        regionCode: { type: string, maxLength: 64 }
        status: { type: string, enum: [enabled, disabled], default: enabled }
    UserUpdateRequest:
      type: object
      properties:
        realName: { type: string, maxLength: 50 }
        roleCode: { $ref: "#/components/schemas/RoleCode" }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$' }
        institutionId: { type: string, maxLength: 64 }
        regionCode: { type: string, maxLength: 64 }
        status: { type: string, enum: [enabled, disabled] }
    UserStatusUpdateRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [enabled, disabled] }
    RoleAssignRequest:
      type: object
      required: [roleCode]
      properties:
        roleCode: { $ref: "#/components/schemas/RoleCode" }
    PasswordRequest:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          { type: string, minLength: 8, maxLength: 64, writeOnly: true }
    ChangePasswordRequest:
      type: object
      required: [oldPassword, newPassword]
      properties:
        oldPassword: { type: string, writeOnly: true }
        newPassword:
          { type: string, minLength: 8, maxLength: 64, writeOnly: true }
    ProfileUpdateRequest:
      type: object
      properties:
        realName: { type: string, maxLength: 50 }
        mobile: { type: string, pattern: '^1[3-9]\d{9}$' }
    ApiUser:
      allOf:
        - { $ref: "#/components/schemas/ApiBase" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/User" }
    UserPage:
      type: object
      required: [list, pageNo, pageSize, total]
      properties:
        list: { type: array, items: { $ref: "#/components/schemas/User" } }
        pageNo: { type: integer }
        pageSize: { type: integer }
        total: { type: integer, format: int64 }
    ApiUserPage:
      allOf:
        - { $ref: "#/components/schemas/ApiBase" }
        - type: object
          properties:
            data: { $ref: "#/components/schemas/UserPage" }

    ElderlyProfile:
      type: object
      properties:
        id: { type: string }
        userId: { type: string, nullable: true }
        name: { type: string }
        gender: { type: string, enum: [male, female, unknown] }
        birthday: { type: string, format: date, nullable: true }
        age: { type: integer, nullable: true }
        phone: { type: string, nullable: true }
