spring:
  datasource:
    url: jdbc:h2:mem:medical_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

jwt:
  secret: medical-big-data-cloud-test-secret-key-at-least-thirty-two-bytes
  access-expiration: 900000
  refresh-expiration: 604800000

app:
  auth:
    apifox-privileged-registration-enabled: true
