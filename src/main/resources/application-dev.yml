spring:
  datasource:
    url: jdbc:h2:file:./data/medical_db;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console

app:
  auth:
    apifox-privileged-registration-enabled: true
  bootstrap-admin:
    enabled: true
    password: ${BOOTSTRAP_ADMIN_PASSWORD:Admin123!}
