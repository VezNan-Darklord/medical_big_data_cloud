server:
  port: 8080
  servlet:
    context-path: /api/v1
  error:
    include-message: never

spring:
  application:
    name: medical-big-data-cloud
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  flyway:
    enabled: true

jwt:
  secret: ${JWT_SECRET:medical-big-data-cloud-development-secret-key-change-before-production}
  access-expiration: ${JWT_ACCESS_EXPIRATION:900000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    default-models-expand-depth: -1

app:
  auth:
    apifox-privileged-registration-enabled: ${APIFOX_PRIVILEGED_REGISTRATION_ENABLED:false}
  bootstrap-admin:
    enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
    username: ${BOOTSTRAP_ADMIN_USERNAME:admin}
    password: ${BOOTSTRAP_ADMIN_PASSWORD:}
    real-name: ${BOOTSTRAP_ADMIN_REAL_NAME:系统管理员}

logging:
  level:
    org.hibernate.SQL: INFO
