server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: medical-big-data-cloud
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

jwt:
  secret: medical-big-data-cloud-jwt-secret-key-change-in-production
  expiration: 86400000  # 24小时，单位毫秒


springdoc:
  api-docs:
    path: /api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
    default-models-expand-depth: -1

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
